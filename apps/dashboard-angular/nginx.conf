server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Liveness for docker-compose healthchecks; returns 200 ok cheaply
    # without touching the SPA bundle.
    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dashboard-angular"}';
    }

    # Angular SPA fallback — every unknown route serves index.html so the
    # client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

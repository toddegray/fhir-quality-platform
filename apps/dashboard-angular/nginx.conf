resolver 127.0.0.11 valid=10s;

upstream edge_node {
    server edge-node:8080;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Liveness for docker-compose healthchecks.
    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dashboard-angular"}';
    }

    # Proxy /api/** through to the edge-node BFF — the dashboard never
    # makes cross-origin calls, only same-origin to its own nginx, which
    # then talks to the backend services on the docker-compose network.
    location /api/ {
        proxy_pass http://edge_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Angular SPA fallback — every unknown route serves index.html so the
    # client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
